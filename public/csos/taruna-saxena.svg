<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Taruna Saxena portrait placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#196439"/>
      <stop offset="60%" stop-color="#0e3722"/>
      <stop offset="100%" stop-color="#082014"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#52b873" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#52b873" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#52b873" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#dbf3e0" fill-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="320" height="320" fill="url(#bg)"/>
  <rect width="320" height="320" fill="url(#dots)"/>
  <rect width="320" height="320" fill="url(#glow)"/>

  <!-- soft leaf accent -->
  <path
    d="M260 30c-46 0-83 32-83 73 0 8 1.5 16 4 23 27-4 51-19 67-46 5.5-9.6 8-21 8-33V30z"
    fill="#2f9c54" fill-opacity="0.12"
  />

  <!-- monogram -->
  <g font-family="Fraunces, Georgia, serif" font-weight="500">
    <text x="160" y="178" text-anchor="middle"
          font-size="118" fill="#faf7f0" letter-spacing="-4">TS</text>
  </g>

  <!-- name plate -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="160" y="232" text-anchor="middle"
          font-size="14" fill="#dbf3e0" letter-spacing="3" font-weight="600">TARUNA SAXENA</text>
    <text x="160" y="254" text-anchor="middle"
          font-size="11" fill="#84d29c" letter-spacing="2" font-weight="500">FRACTIONAL CSO</text>
  </g>

  <!-- accent dot -->
  <circle cx="280" cy="280" r="5" fill="#84d29c"/>
</svg>
